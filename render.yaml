# Render Blueprint — connect repo and deploy Web Service
# Set secret env vars (SECRET_KEY, DB_*) in the Render dashboard.

services:
  - type: web
    name: school-fms
    runtime: python
    plan: free
    # Free tier: no preDeployCommand — migrations run at container start
    buildCommand: pip install -r requirements.txt && SECRET_KEY=build-dummy-key ALLOWED_HOSTS=localhost python manage.py collectstatic --noinput
    startCommand: python manage.py migrate --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DEBUG
        value: "False"
      - key: WEB_CONCURRENCY
        value: "2"
