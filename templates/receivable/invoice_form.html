{% extends 'base.html' %}
{% block title %}New Invoice{% endblock %}
{% block page_title %}Create Invoice{% endblock %}

{% block content %}
<div class="fade-in">
    <div class="card">
        <div class="card-header">
            <h3 class="card-title"><i class="fas fa-plus-circle"></i> New Invoice</h3>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Student</label>
                    <select name="student" class="form-control" required>
                        <option value="">Select Student</option>
                        {% for s in students %}
                        <option value="{{ s.id }}">{{ s.student_id }} — {{ s.full_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Amount</label>
                    <input type="number" name="amount" step="0.01" class="form-control" required>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Description</label>
                <input type="text" name="description" class="form-control" placeholder="e.g., Tuition Fee - Semester 1"
                    required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Due Date</label>
                    <input type="date" name="due_date" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Academic Year</label>
                    <input type="text" name="academic_year" class="form-control" placeholder="2025/2026" required>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Term</label>
                <input type="text" name="term" class="form-control" placeholder="Semester 1">
            </div>
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Create Invoice</button>
            <a href="{% url 'invoices' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
