{% extends 'base.html' %}
{% block title %}Confirm Delete{% endblock %}
{% block page_title %}Confirm Action{% endblock %}

{% block content %}
<div class="fade-in">
    <div class="card" style="max-width: 600px; margin: 40px auto; text-align: center;">
        <div style="padding: 30px;">
            <i class="fas fa-exclamation-triangle"
                style="font-size: 48px; color: var(--danger); margin-bottom: 20px;"></i>
            <h2 style="margin-bottom: 10px;">Are you sure?</h2>
            <p style="color: var(--text-secondary); margin-bottom: 20px;">{{ message|default:"This action cannot be
                undone." }}</p>
            <div style="background: var(--bg-alt); border-radius: 8px; padding: 15px; margin-bottom: 25px;">
                <strong>{{ object_name }}</strong>
            </div>
            <form method="post" style="display: inline;">
                {% csrf_token %}
                <button type="submit" class="btn" style="background: var(--danger); color: white;"><i
                        class="fas fa-trash"></i> {{ action_label|default:"Delete" }}</button>
                <a href="{{ cancel_url }}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
