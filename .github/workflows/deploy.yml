name: Deploy School FMS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /var/www/school_fms
            git pull origin main
            
            # 1. Build the updated image
            docker build -t school_fms .

            # 2. Stop and remove the old container
            docker stop school_fms_app || true
            docker rm school_fms_app || true
            
            # 3. Run the container with volumemounts for host Nginx access
            docker run -d \
              --name school_fms_app \
              --restart always \
              -p 8000:8000 \
              --env-file /var/www/school_fms/.env \
              -v /var/www/school_fms/static:/app/staticfiles \
              -v /var/www/school_fms/media:/app/media \
              school_fms
            
            # 4. Cleanup old/dangling images
            docker image prune -f
